name: Publish

# One-click release for @nijam/vitest-reporter:
#   bump version → commit + tag (vX.Y.Z) → verify → publish to npm → push commit + tag.
# Run it from the Actions tab: "Publish" → "Run workflow", pick a bump type.
#
# Required repo secret: NPM_TOKEN — an npm automation token with publish access to
# the @nijam scope (Settings → Secrets and variables → Actions).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump'
        type: choice
        required: true
        default: prerelease
        options:
          - prerelease
          - patch
          - minor
          - major
      preid:
        description: 'Prerelease identifier (used only by the "prerelease" bump)'
        type: string
        required: false
        default: alpha

permissions:
  contents: write # push the version-bump commit + tag
  id-token: write # npm provenance (public repo only)

# Never let two publishes overlap.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags, so the verify step can resolve the tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Validate the build BEFORE bumping/publishing anything.
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      # `dist/` is gitignored, so the tree is clean here — npm version creates the
      # bump commit + a `v<version>` tag on HEAD.
      - name: Bump version + create tag
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
          PREID: ${{ inputs.preid }}
        run: |
          npm version "$BUMP" --preid="$PREID" -m 'release: %s'
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      # Guard: the freshly created tag MUST point at the commit we're about to
      # publish (HEAD), and that version must not already exist on npm. Either
      # mismatch fails the run before anything is published or pushed.
      - name: Verify tag matches the publish commit
        env:
          TAG: ${{ steps.bump.outputs.tag }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          TAG_SHA="$(git rev-parse "$TAG^{commit}")"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "::error::Tag $TAG points at $TAG_SHA but the publish commit is $HEAD_SHA — refusing to publish."
            exit 1
          fi
          if npm view "@nijam/vitest-reporter@$VERSION" version >/dev/null 2>&1; then
            echo "::error::@nijam/vitest-reporter@$VERSION is already published on npm — bump again."
            exit 1
          fi
          echo "OK — $TAG → $HEAD_SHA; version $VERSION is not yet on npm."

      # --access public: scoped (@nijam) packages are private by default.
      # --provenance: signed build attestation; needs a PUBLIC repo + id-token:write.
      #   If the repo is private, drop "--provenance".
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Record the release in git only AFTER npm accepted it (publish is the one
      # irreversible step). Pushes to the branch the workflow was dispatched from.
      - name: Push bump commit + tag
        env:
          TAG: ${{ steps.bump.outputs.tag }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git push origin "HEAD:$BRANCH"
          git push origin "$TAG"
